<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <svg class="logo" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00af87" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
        <path d="m15 5 4 4"/>
      </svg>
      <h1>MarkUp</h1>
    </div>
    <p class="subtitle">Visual Annotation Tool</p>
    <button id="btn-annotate" class="btn-primary">Annotate</button>
    <div class="instructions">
      <p>Click <strong>Annotate</strong> to enable annotation mode on the current page.</p>
      <ul>
        <li>Draw, arrows, rectangles</li>
        <li>Text notes &amp; numbered pins</li>
        <li>Save as PNG or copy to clipboard</li>
        <li><strong>ESC</strong> to close</li>
      </ul>
    </div>
    <div class="footer"><a href="https://myfrendo.com" target="_blank">by Myfrendo</a></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
