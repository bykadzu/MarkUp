<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <svg class="logo" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
        <path d="m15 5 4 4"/>
      </svg>
      <h1>MarkUp</h1>
    </div>
    <p class="subtitle">Visuelles Annotations-Tool</p>
    <button id="btn-annotate" class="btn-primary">Annotieren</button>
    <div class="instructions">
      <p>Klicke auf <strong>Annotieren</strong>, um den Annotations-Modus auf der aktuellen Seite zu aktivieren.</p>
      <ul>
        <li>Zeichnen, Pfeile, Rechtecke</li>
        <li>Textnotizen &amp; nummerierte Pins</li>
        <li>Als PNG speichern oder in die Zwischenablage kopieren</li>
        <li><strong>ESC</strong> zum Beenden</li>
      </ul>
    </div>
    <div class="footer">by Myfrendo</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
